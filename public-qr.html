<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KING OF Slipper Public QR</title>
    <style>
      :root {
        color-scheme: dark;
        --gold: #e4c45c;
        --ink: #f6f0df;
        --muted: #b9b0a0;
        --panel: #171a20;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px) 0 0 / 74px 74px,
          radial-gradient(circle at 50% 0%, rgba(228, 196, 92, 0.2), transparent 34%),
          #0b0b0d;
        color: var(--ink);
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
      }

      main {
        width: min(620px, 100%);
        border: 1px solid rgba(228, 196, 92, 0.42);
        border-radius: 10px;
        padding: 22px;
        background: rgba(23, 26, 32, 0.94);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--gold);
        font-size: 12px;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 8vw, 58px);
        line-height: 0.95;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      .qr-wrap {
        display: grid;
        place-items: center;
        margin: 18px 0;
        border-radius: 10px;
        padding: 18px;
        background: #f8f8f4;
      }

      .qr-wrap img {
        width: min(320px, 100%);
        aspect-ratio: 1 / 1;
      }

      .url-box {
        overflow-wrap: anywhere;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 12px;
        background: rgba(0, 0, 0, 0.24);
        color: var(--ink);
        font-weight: 800;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button,
      a {
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 0 16px;
        display: inline-grid;
        place-items: center;
        background: #252b34;
        color: var(--ink);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
      }

      .primary {
        border-color: rgba(228, 196, 92, 0.65);
        background: var(--gold);
        color: #161410;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">PUBLIC BETA QR</p>
      <h1>KING OF Slipper!</h1>
      <p>公開β用のQRコードです。スマホで読み取るとゲームを開けます。</p>
      <div class="qr-wrap">
        <img id="qr" alt="KING OF Slipper 公開URL QRコード" />
      </div>
      <div id="url" class="url-box"></div>
      <div class="actions">
        <a id="openGame" class="primary" href="#">ゲームを開く</a>
        <button id="copyUrl" type="button">URLをコピー</button>
      </div>
      <p>GitHub Pages公開後にこのページを開けば、配布用QRとして使えます。</p>
    </main>
    <script>
      const fallbackUrl = "https://keisi3926-bit.github.io/king-of-slipper/";
      const params = new URLSearchParams(location.search);
      const gameUrl = params.get("url") || fallbackUrl;
      const qr = document.querySelector("#qr");
      const url = document.querySelector("#url");
      const openGame = document.querySelector("#openGame");
      const copyUrl = document.querySelector("#copyUrl");

      qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=16&data=${encodeURIComponent(gameUrl)}`;
      url.textContent = gameUrl;
      openGame.href = gameUrl;
      copyUrl.addEventListener("click", async () => {
        await navigator.clipboard.writeText(gameUrl);
        copyUrl.textContent = "コピー済み";
        setTimeout(() => {
          copyUrl.textContent = "URLをコピー";
        }, 1200);
      });
    </script>
  </body>
</html>
